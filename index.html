<!DOCTYPE html>
<html lang="en">
<head>
    <title>Minecraft Armor Viewer</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; display: flex; }
        #sidebar { width: 300px; padding: 20px; background: #333; height: 100vh; z-index: 10; }
        #viewer { flex-grow: 1; height: 100vh; }
        input { margin-bottom: 20px; display: block; }
        .label { font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Armor Previewer</h2>
    <span class="label">Upload Armor Layer 1 (Head/Body):</span>
    <input type="file" id="layer1" accept="image/png">
    
    <span class="label">Upload Armor Layer 2 (Legs):</span>
    <input type="file" id="layer2" accept="image/png">
    
    <p><small>Note: Use standard 64x32 or 64x64 armor textures.</small></p>
</div>

<div id="viewer"></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

    // --- SETUP SCENE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth - 300, window.innerHeight);
    document.getElementById('viewer').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 2, 5);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5).updateMatrixWorld();
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

    // --- CREATE PLAYER BOXES (Simplified Steve) ---
    const material = new THREE.MeshStandardMaterial({ color: 0x555555 }); // Placeholder gray
    const bodyGroup = new THREE.Group();

    function createPart(w, h, d, y) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mesh = new THREE.Mesh(geo, material.clone());
        mesh.position.y = y;
        bodyGroup.add(mesh);
        return mesh;
    }

    const head = createPart(1, 1, 1, 2.5);
    const chest = createPart(1, 1.5, 0.5, 1.25);
    const lArm = createPart(0.5, 1.5, 0.5, 1.25); lArm.position.x = -0.75;
    const rArm = createPart(0.5, 1.5, 0.5, 1.25); rArm.position.x = 0.75;
    const lLeg = createPart(0.5, 1.5, 0.5, -0.25); lLeg.position.x = -0.25;
    const rLeg = createPart(0.5, 1.5, 0.5, -0.25); rLeg.position.x = 0.25;

    scene.add(bodyGroup);

    // --- TEXTURE LOADING LOGIC ---
    function applyTexture(inputEl, targetMeshes) {
        inputEl.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const loader = new THREE.TextureLoader();
                const texture = loader.load(event.target.result);
                texture.magFilter = THREE.NearestFilter; // Keeps it pixelated/Minecraft style
                
                targetMeshes.forEach(mesh => {
                    mesh.material.map = texture;
                    mesh.material.transparent = true;
                    mesh.material.needsUpdate = true;
                });
            };
            reader.readAsDataURL(file);
        });
    }

    // Apply layer 1 to Head, Chest, Arms
    applyTexture(document.getElementById('layer1'), [head, chest, lArm, rArm]);
    // Apply layer 2 to Legs
    applyTexture(document.getElementById('layer2'), [lLeg, rLeg]);

    // --- ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
