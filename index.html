<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vortex Merger | Drag & Drop Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --electric: #00f2ff; --void: #120024; --error: #ff4d4d; }
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .merger-box { 
            background: #0a0a0a; 
            border: 2px solid var(--electric); 
            padding: 30px; 
            border-radius: 20px; 
            width: 550px; 
            text-align: center; 
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15); 
        }
        .drop-zone { 
            border: 2px dashed #333; 
            padding: 40px 20px; 
            margin-bottom: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            border-radius: 12px;
            background: #111;
        }
        .drop-zone.dragover { 
            border-color: var(--electric); 
            background: rgba(0, 242, 255, 0.1); 
            transform: scale(1.02);
        }
        .file-list { 
            background: #000; 
            border: 1px solid #222; 
            height: 180px; 
            margin-bottom: 15px; 
            overflow-y: auto; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: left; 
            font-size: 13px; 
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #111;
        }
        .merge-btn { 
            background: linear-gradient(45deg, var(--electric), #0077ff); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase;
            font-size: 14px;
        }
        .merge-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .clear-btn {
            background: none;
            border: 1px solid var(--error);
            color: var(--error);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="merger-box">
    <h2 style="color:var(--electric); margin-top:0; letter-spacing: 3px;">VORTEX MERGER</h2>
    
    <div class="drop-zone" id="dropZone">
        <div style="font-size: 24px; margin-bottom: 10px;">📥</div>
        <p id="dropText">Drop ZIP files here or click to browse</p>
        <input type="file" id="zipInput" hidden multiple accept=".zip">
    </div>

    <div class="file-list" id="fileList">
        <p style="color:#444; text-align:center;">No packs loaded...</p>
    </div>

    <button id="mergeBtn" class="merge-btn" onclick="mergePacks()" disabled>Combine into Master Pack</button>
    <button class="clear-btn" onclick="clearList()">Clear All Files</button>
</div>

<script>
    let uploadedZips = [];
    const dropZone = document.getElementById('dropZone');
    const zipInput = document.getElementById('zipInput');
    const fileList = document.getElementById('fileList');
    const mergeBtn = document.getElementById('mergeBtn');

    // Drag and Drop Logic
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    dropZone.addEventListener('click', () => zipInput.click());

    zipInput.onchange = (e) => handleFiles(e.target.files);

    function handleFiles(files) {
        const newFiles = Array.from(files).filter(f => f.name.endsWith('.zip'));
        uploadedZips = [...uploadedZips, ...newFiles];
        updateList();
    }

    function updateList() {
        if (uploadedZips.length === 0) {
            fileList.innerHTML = '<p style="color:#444; text-align:center;">No packs loaded...</p>';
            mergeBtn.disabled = true;
            return;
        }
        
        fileList.innerHTML = uploadedZips.map((f, index) => `
            <div class="file-item">
                <span>📦 ${f.name}</span>
                <span style="color:#666;">(${(f.size / 1024).toFixed(1)} KB)</span>
            </div>
        `).join('');
        mergeBtn.disabled = false;
    }

    function clearList() {
        uploadedZips = [];
        updateList();
    }

    async function mergePacks() {
        const masterZip = new JSZip();
        mergeBtn.innerText = "Processing Data...";
        mergeBtn.disabled = true;

        // Create the base pack.mcmeta
        masterZip.file("pack.mcmeta", JSON.stringify({
            pack: { pack_format: 48, description: "Vortex Master Collection Combined" }
        }));

        for (const file of uploadedZips) {
            try {
                const zip = await JSZip.loadAsync(file);
                for (const [path, zipEntry] of Object.entries(zip.files)) {
                    // Skip mcmeta from individual packs
                    if (!path.includes("pack.mcmeta") && !zipEntry.dir) {
                        const content = await zipEntry.async("blob");
                        masterZip.file(path, content);
                    }
                }
            } catch (err) {
                console.error("Failed to read " + file.name, err);
            }
        }

        const finalBlob = await masterZip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(finalBlob);
        link.download = "Vortex_Master_Pack.zip";
        link.click();
        
        mergeBtn.innerText = "Combine into Master Pack";
        mergeBtn.disabled = false;
    }
</script>

</body>
</html>
