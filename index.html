<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple AI Code Generator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #1c1c1c;
      color: #00ff99;
      border: 1px solid #333;
      padding: 10px;
      resize: none;
      font-family: monospace;
    }

    button {
      padding: 10px;
      background: #00ff99;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      background: #1c1c1c;
      padding: 10px;
      border: 1px solid #333;
      overflow-x: auto;
      min-height: 200px;
      color: #00ff99;
    }
  </style>
</head>
<body>
  <h1>AI Code Generator</h1>
  <div class="container">
    <textarea id="prompt" placeholder="Type what you want to create... e.g. make a Minecraft sword model"></textarea>
    <button onclick="generateCode()">Generate Code</button>
    <pre id="output">Your code will appear here...</pre>
  </div>

  <script>
    function generateCode() {
      const prompt = document.getElementById('prompt').value.toLowerCase();
      let code = '';

      if (prompt.includes('sword')) {
        code = `{
  "model": "minecraft:sword",
  "texture": "diamond_sword.png",
  "elements": [
    {"from": [0,0,0], "to": [1,10,1]}
  ]
}`;
      } else if (prompt.includes('block')) {
        code = `{
  "model": "minecraft:block",
  "elements": [
    {"from": [0,0,0], "to": [16,16,16]}
  ]
}`;
      } else if (prompt.includes('mace')) {
        code = `{
  "model": "minecraft:mace",
  "elements": [
    {"from": [6,0,6], "to": [10,14,10]},
    {"from": [7,14,7], "to": [9,22,9]}
  ]
}`;
      } else {
        code = `// No template found for: "${prompt}"
{
  "error": "Try sword, block, or mace"
}`;
      }

      document.getElementById('output').textContent = code;
    }
  </script>
</body>
</html>
