<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comet Client</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="particles"></div>

<nav class="nav">
    <div class="logo">☄️ Comet</div>
    <div class="links">
        <a href="#home">Home</a>
        <a href="#features">Features</a>
        <a href="#download">Download</a>
    </div>
</nav>

<header id="home" class="hero reveal">
    <h1>Comet Client</h1>
    <p>Fast. Clean. Competitive Minecraft PvP Client.</p>
    <a class="bigbtn" href="#download">Get Started</a>
</header>

<section id="features" class="section reveal">
    <h2>🔥 Features</h2>

    <div class="cards">
        <div class="card">⚡ FPS Boost</div>
        <div class="card">🎯 PvP HUD</div>
        <div class="card">🧠 Smart UI</div>
        <div class="card">🚀 Fast Launch</div>
        <div class="card">🎮 Mods Support</div>
        <div class="card">🖥️ Clean Design</div>
    </div>
</section>

<section id="download" class="section reveal">
    <h2>⬇️ Download</h2>
    <p>Get the latest version of Comet Client.</p>

    <button class="download" onclick="downloadClient()">Download</button>
    <p id="status"></p>
</section>

<footer>
    <p>© 2026 Comet Client. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
