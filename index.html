<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Sound Pack Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: white; padding: 40px; text-align: center; }
        .box { background: #333; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; border: 2px solid #555; }
        select, input, button { width: 100%; margin: 10px 0; padding: 10px; border-radius: 5px; border: none; }
        button { background: #3e8e41; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>

    <h2>MC Sound Pack Generator</h2>
    <div class="box">
        <label>1. Upload your sound (.ogg or .wav):</label>
        <input type="file" id="audioFile" accept=".ogg,.wav">

        <label>2. What are you replacing?</label>
        <select id="soundType">
            <option value="item.trident.throw">Trident Throw</option>
            <option value="entity.player.attack.sweep">Sword Swing (Sweep)</option>
            <option value="entity.arrow.shoot">Bow Shot</option>
            <option value="ui.button.click">Menu Click</option>
            <option value="entity.generic.explode">Explosion</option>
        </select>

        <label>3. Pack Name:</label>
        <input type="text" id="packName" placeholder="My Cool Sounds">

        <button onclick="generatePack()">Download Ready-to-Go Pack</button>
    </div>

    <script>
        async function generatePack() {
            const fileInput = document.getElementById('audioFile');
            const soundType = document.getElementById('soundType').value;
            const packName = document.getElementById('packName').value || "CustomSounds";
            
            if (fileInput.files.length === 0) {
                alert("Please upload a sound file first!");
                return;
            }

            const zip = new JSZip();
            const file = fileInput.files[0];
            const fileName = "custom_sound.ogg"; // Minecraft prefers .ogg

            // 1. Create pack.mcmeta
            const mcmeta = {
                "pack": {
                    "pack_format": 15,
                    "description": "Created with Gemini's Tool"
                }
            };
            zip.file("pack.mcmeta", JSON.stringify(mcmeta, null, 4));

            // 2. Create the folder structure and add the sound
            // Path: assets/minecraft/sounds/custom/
            const soundFolder = zip.folder("assets/minecraft/sounds/custom");
            soundFolder.file(fileName, file);

            // 3. Create sounds.json to tell the game to use our new file
            const soundsJson = {};
            soundsJson[soundType] = {
                "replace": true,
                "sounds": [{ "name": "custom/custom_sound", "stream": false }]
            };
            zip.folder("assets/minecraft").file("sounds.json", JSON.stringify(soundsJson, null, 4));

            // 4. Generate the ZIP and download
            zip.generateAsync({type:"blob"}).then(function(content) {
                const element = document.createElement('a');
                element.href = URL.createObjectURL(content);
                element.download = packName + ".zip";
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            });
        }
    </script>
</body>
</html>
