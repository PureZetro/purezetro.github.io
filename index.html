<!DOCTYPE html>
<html lang="en">
<head>
    <title>Player Tier List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Competitive Tier List</h1>
        <input type="text" id="searchInput" placeholder="Search for a player...">
        
        <table id="tierTable">
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Tier</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
