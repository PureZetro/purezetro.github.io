<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blockbench Converter</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#1e1e1e;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    margin-top:0;
    font-size:40px;
}

textarea{
    width:100%;
    height:400px;
    background:black;
    color:#00ff88;
    border:1px solid #333;
    border-radius:15px;
    padding:15px;
    font-family:monospace;
    font-size:14px;
    resize:vertical;
}

button{
    margin-top:20px;
    padding:15px 25px;
    border:none;
    border-radius:15px;
    background:white;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.info{
    margin-top:30px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>Blockbench Project Converter</h1>

<p>Paste your Minecraft Java model JSON below and download a .bbmodel project.</p>

<textarea id="jsonInput">
{
  "textures": {
    "0": "item/mace"
  },
  "elements": [
    {
      "from": [7.5, 0, 7.5],
      "to": [8.5, 12, 8.5]
    }
  ]
}
</textarea>

<br>

<button onclick="downloadProject()">Download .bbmodel</button>

<div class="info">
<p><b>How to use:</b></p>
<ol>
<li>Paste your Java model JSON</li>
<li>Click Download .bbmodel</li>
<li>Open Blockbench</li>
<li>File → Open Model</li>
<li>Select the downloaded file</li>
</ol>
</div>

</div>

<script>
function downloadProject() {

    const input = document.getElementById("jsonInput").value;

    try {

        const parsed = JSON.parse(input);

        const bbmodel = {
            meta: {
                format_version: "4.9",
                model_format: "java_block"
            },

            name: "Converted Model",

            resolution: {
                width: 64,
                height: 64
            },

            elements: parsed.elements || [],

            textures: [
                {
                    path: "mace.png",
                    name: "mace"
                }
            ],

            outliner: []
        };

        const jsonString = JSON.stringify(bbmodel, null, 2);

        const blob = new Blob(
            [jsonString],
            { type: "application/json" }
        );

        const url = URL.createObjectURL(blob);

        const link = document.createElement("a");

        link.href = url;
        link.download = "model.bbmodel";

        document.body.appendChild(link);

        link.click();

        document.body.removeChild(link);

        setTimeout(() => {
            URL.revokeObjectURL(url);
        }, 100);

    } catch(err) {

        console.error(err);

        alert("Invalid JSON!");
    }
}
</script>

</body>
</html>
