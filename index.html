<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft 3D Viewer PRO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
  font-family: Arial;
  color: white;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
  width: 300px;
}

button {
  margin-top: 5px;
  padding: 6px;
  background: #222;
  color: white;
  border: none;
  cursor: pointer;
  width: 100%;
}

button:hover {
  background: #333;
}

#itemList {
  max-height: 150px;
  overflow-y: auto;
  font-size: 12px;
  margin-top: 10px;
}

.slot {
  width: 40px;
  height: 40px;
  background: rgba(0,0,0,0.5);
  border: 1px solid #555;
}

#inventory {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: repeat(9, 40px);
  gap: 4px;
}
</style>
</head>

<body>

<div id="ui">
  <input type="file" id="zipInput" accept=".zip">

  <button onclick="setMode('sword')">🗡 Sword Mode</button>
  <button onclick="setMode('armor')">🪖 Armor Mode</button>
  <button onclick="startRecording()">🎥 Start Record</button>
  <button onclick="stopRecording()">⛔ Stop Record</button>

  <div id="status">Upload a resource pack</div>
  <div id="itemList"></div>
</div>

<div id="inventory">
  <div class="slot"></div><div class="slot"></div><div class="slot"></div>
  <div class="slot"></div><div class="slot"></div><div class="slot"></div>
  <div class="slot"></div><div class="slot"></div><div class="slot"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let scene, camera, renderer;
let modelGroup;
let sword, head;
let mode = "sword";

let textures = {};
let recorder;
let chunks = [];

init();
animate();

/* ---------------- INIT ---------------- */

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 4;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // lights
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,5);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));

  modelGroup = new THREE.Group();
  scene.add(modelGroup);

  createSword();
  createHead();

  window.addEventListener("resize", onResize);
  document.getElementById("zipInput").addEventListener("change", handleZip);
}

/* ---------------- MODELS ---------------- */

function createSword() {
  sword = new THREE.Group();

  const blade = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 1.5, 0.1),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  blade.position.y = 0.6;

  const handle = new THREE.Mesh(
    new THREE.BoxGeometry(0.15, 0.4, 0.15),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  handle.position.y = -0.4;

  sword.add(blade);
  sword.add(handle);

  modelGroup.add(sword);
}

function createHead() {
  const headGeo = new THREE.BoxGeometry(1,1,1);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });

  head = new THREE.Mesh(headGeo, mat);

  const helmet = new THREE.Mesh(
    new THREE.BoxGeometry(1.1,1.1,1.1),
    mat
  );

  const group = new THREE.Group();
  group.name = "headModel";

  group.add(head);
  group.add(helmet);

  modelGroup.add(group);
}

/* ---------------- ZIP LOAD ---------------- */

function handleZip(e) {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("status").innerText = "Loading pack...";

  JSZip.loadAsync(file).then(zip => {
    textures = {};
    document.getElementById("itemList").innerHTML = "";

    const folder = "assets/minecraft/textures/item/";

    zip.forEach(async (path, file) => {
      if (path.startsWith(folder) && path.endsWith(".png")) {

        const blob = await file.async("blob");
        const url = URL.createObjectURL(blob);

        const tex = new THREE.TextureLoader().load(url);

        const name = path.split("/").pop().replace(".png","");

        textures[name] = tex;

        const div = document.createElement("button");
        div.innerText = name;

        div.onclick = () => applyTexture(tex);

        document.getElementById("itemList").appendChild(div);
      }
    });

    document.getElementById("status").innerText = "Pack Loaded ✔";
  });
}

/* ---------------- APPLY TEXTURE ---------------- */

function applyTexture(tex) {
  modelGroup.traverse(obj => {
    if (obj.isMesh) {
      obj.material = new THREE.MeshBasicMaterial({ map: tex });
    }
  });
}

/* ---------------- MODE SWITCH ---------------- */

function setMode(m) {
  mode = m;

  sword.visible = (m === "sword");
  modelGroup.getObjectByName("headModel").visible = (m === "armor");

  document.getElementById("status").innerText = "Mode: " + m;
}

/* ---------------- RECORDING ---------------- */

function startRecording() {
  const stream = renderer.domElement.captureStream(60);

  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    const blob = new Blob(chunks, {type:"video/webm"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "turntable.webm";
    a.click();
  };

  recorder.start();
}

function stopRecording() {
  recorder.stop();
}

/* ---------------- LOOP ---------------- */

function animate() {
  requestAnimationFrame(animate);

  modelGroup.rotation.y += 0.01;

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
