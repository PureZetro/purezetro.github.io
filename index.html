<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Resource Pack Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="importmap">
        { "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "controls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }}
    </script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #252525; display: flex; flex-direction: column; border-right: 2px solid #444; }
        #drop-zone { padding: 20px; border: 2px dashed #666; margin: 10px; text-align: center; cursor: pointer; }
        #item-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .item-card { background: #333; margin: 5px 0; padding: 8px; display: flex; align-items: center; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .item-card:hover { background: #444; border-left: 4px solid #3498db; }
        .item-card img { width: 32px; height: 32px; image-rendering: pixelated; margin-right: 10px; }
        #viewer { flex-grow: 1; position: relative; }
        .controls-hint { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="drop-zone">Drop .zip Resource Pack Here</div>
    <div id="item-list"></div>
</div>
<div id="viewer">
    <div class="controls-hint">Left Click: Rotate | Right Click: Pan | Scroll: Zoom</div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'controls';

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth - 350, window.innerHeight);
    document.getElementById('viewer').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 2, 5);

    const light = new THREE.AmbientLight(0xffffff, 0.8);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 5);
    scene.add(light, dirLight);

    // --- PLAYER MODEL ---
    const steveGroup = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x888888 });

    function createBox(w, h, d, x, y, z) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat.clone());
        mesh.position.set(x, y, z);
        steveGroup.add(mesh);
        return mesh;
    }

    const head = createBox(1, 1, 1, 0, 2.5, 0);
    const body = createBox(1, 1.5, 0.5, 0, 1.25, 0);
    const rArm = createBox(0.5, 1.5, 0.5, 0.8, 1.25, 0);
    const lArm = createBox(0.5, 1.5, 0.5, -0.8, 1.25, 0);
    const rLeg = createBox(0.5, 1.5, 0.5, 0.25, -0.25, 0);
    const lLeg = createBox(0.5, 1.5, 0.5, -0.25, -0.25, 0);
    scene.add(steveGroup);

    // Tool Slot (Right Hand)
    const toolGroup = new THREE.Group();
    rArm.add(toolGroup);
    toolGroup.position.set(0, -0.6, 0.3);

    // --- ZIP HANDLING ---
    const dropZone = document.getElementById('drop-zone');
    const itemList = document.getElementById('item-list');

    dropZone.addEventListener('dragover', e => e.preventDefault());
    dropZone.addEventListener('drop', async (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file.name.endsWith('.zip')) return alert("Please drop a .zip file");
        
        const zip = await JSZip.loadAsync(file);
        itemList.innerHTML = ""; // Clear list

        zip.forEach(async (path, entry) => {
            if (path.endsWith('.png') && path.includes('textures/')) {
                const blob = await entry.async("blob");
                const url = URL.createObjectURL(blob);
                const name = path.split('/').pop();

                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `<img src="${url}"> <span>${name}</span>`;
                
                card.onclick = () => {
                    const tex = new THREE.TextureLoader().load(url);
                    tex.magFilter = THREE.NearestFilter;
                    
                    // Logic: Is it armor or an item?
                    if (path.includes('models/armor')) {
                        if (name.includes('layer_1')) {
                            [head, body, rArm, lArm].forEach(m => m.material.map = tex);
                        } else {
                            [rLeg, lLeg].forEach(m => m.material.map = tex);
                        }
                    } else {
                        // It's a tool/item
                        toolGroup.clear();
                        const toolGeo = new THREE.PlaneGeometry(1, 1);
                        const toolMesh = new THREE.Mesh(toolGeo, new THREE.MeshStandardMaterial({ 
                            map: tex, transparent: true, side: THREE.DoubleSide 
                        }));
                        toolGroup.add(toolMesh);
                    }
                };
                itemList.appendChild(card);
            }
        });
        dropZone.innerText = "Pack Loaded: " + file.name;
    });

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = (window.innerWidth - 350) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
    });
</script>

</body>
</html>
